        external: "{{ ENV.IRS.SCHEME.EXTERNAL }}://{{ ENV.IRS.HOST.EXTERNAL }}:{{ ENV.IRS.PORT.EXTERNAL }}{{ ENV.IRS.PATH.EXTERNAL }}"
